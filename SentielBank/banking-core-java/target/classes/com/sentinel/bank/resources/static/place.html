<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SentinelBank Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="place.css">
</head>
<body>

<h1> Banka Güvenlik Simülasyonu</h1>

<p>Şu anki Konum: <strong id="current-city" style="color: var(--safe-green)">Yükleniyor...</strong></p>

<button class="btn" onclick="simulate()"> İşlem Üret</button>

<div id="status">Sistem Hazır...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([0, 0], 2); // Önce dünyayı göster
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var marker;
    var pathLine;

    // --- YENİ EKLENEN KISIM: Sayfa Açılınca Başlangıç Konumunu Çek ---
    window.onload = async function() {
        try {
            let response = await fetch('http://localhost:8080/api/risk/current-location');
            let location = await response.json();

            // Haritayı oraya odakla
            var startLatLon = [location.latitude, location.longitude];
            map.setView(startLatLon, 5);

            // Marker koy
            marker = L.marker(startLatLon).addTo(map).bindPopup("Başlangıç: " + location.cityName).openPopup();

            // Yazıyı güncelle
            document.getElementById("current-city").innerText = location.cityName;

        } catch (error) {
            console.error("Başlangıç konumu alınamadı:", error);
            document.getElementById("current-city").innerText = "Bağlantı Hatası!";
        }
    };

    async function simulate() {
        document.getElementById("status").innerText = "⏳ Analiz ediliyor...";

        try {
            let response = await fetch('http://localhost:8080/api/risk/simulate-random', { method: 'POST' });
            let data = await response.json();

            let statusBox = document.getElementById("status");
            statusBox.innerText = data.message;
            statusBox.className = data.isFraud ? "fraud" : "safe";

            if (pathLine) map.removeLayer(pathLine);

            var newLatLng = [data.lat, data.lon];
            var oldLatLng = marker.getLatLng();

            pathLine = L.polyline([oldLatLng, newLatLng], {
                color: data.isFraud ? '#ff0f0f' : '#00ff88',
                weight: 3
            }).addTo(map);

            marker.setLatLng(newLatLng).bindPopup(data.city).openPopup();
            map.flyTo(newLatLng, 5);

            // Üstteki şehir ismini de güncelle
            if (!data.isFraud) {
                document.getElementById("current-city").innerText = data.city;
            }

        } catch (err) {
            console.error(err);
            document.getElementById("status").innerText = " Hata: Java Sunucusu Çalışmıyor Olabilir!";
            document.getElementById("status").className = "fraud";
        }
    }
</script>
</body>
</html>
